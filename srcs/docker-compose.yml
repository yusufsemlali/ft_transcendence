name: ft_transcendence

services:
  # -------------------------------------------------------------------------
  # POSTGRESQL DATABASE
  # -------------------------------------------------------------------------
  database:
    container_name: ft_database
    build: requirements/database
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    expose:
      - "5432"
    volumes:
      - ~/tmp/db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transcendence-net

  # -------------------------------------------------------------------------
  # BACKEND (Express + TS)
  # -------------------------------------------------------------------------
  backend:
    container_name: ft_backend
    build:
      context: ./requirements
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - INTERNAL_CHAT_API_URL=http://ft_chat:4000/api
    expose:
      - "3000"
    volumes:
      - ./requirements/backend:/app/backend
      - ./requirements/shared:/app/shared
      - /app/backend/node_modules
      - /app/shared/contracts/node_modules
    depends_on:
      database:
        condition: service_healthy
    networks:
      - transcendence-net

  chat:
    container_name: ft_chat
    build:
      context: ./requirements
      dockerfile: chat/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CORS_ORIGIN=*
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - transcendence-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      database:
        condition: service_healthy 
 

  # -------------------------------------------------------------------------
  # FRONTEND (Next.js)
  # -------------------------------------------------------------------------
  frontend:
    container_name: ft_frontend
    build:
      context: ./requirements
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    volumes:
      - ./requirements/frontend:/app/frontend
      - ./requirements/shared:/app/shared
      - /app/frontend/node_modules
      - /app/frontend/.next
      - /app/shared/contracts/node_modules
    networks:
      - transcendence-net

  # -------------------------------------------------------------------------
  # NGINX (Reverse Proxy)
  # -------------------------------------------------------------------------
  nginx:
    container_name: ft_nginx
    build: requirements/nginx
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - chat
      - frontend
    networks:
      - transcendence-net

networks:
  transcendence-net:
    driver: bridge
